# gui/themes/dark/default.yml — Default dark theme.
name: Default Dark

palette:
  accent:           "#6B7D20"   # desaturated brand green for dark-mode accent
  window:           "#282828"
  alternate_base:   "#333333"
  base:             "#3a3a3a"
  button:           "#3a3a3a"
  mid:              "#505050"
  midlight:         "#484848"
  light:            "#555555"
  highlight:        "#6B7D20"
  highlighted_text: "#ffffff"
  text:             "#e2e2e2"
  window_text:      "#e2e2e2"
  button_text:      "#e2e2e2"
  placeholder_text: "#888888"

qss_tokens:
  "$primary-hover":  "#0b5ed7"
  "$primary-active": "#0a58ca"
  "$border-subtle":  "#5a5a5a"
  "$surface-active": "#525252"
  "$body-color":     "#e2e2e2"
  "$secondary":      "#a0a0a0"
  "$primary":        "#0d6efd"
  "$body-bg":        "#282828"
  "$border":         "#505050"
  "$surface":        "#4a4a4a"
  "$muted":          "#686868"
  "$white":          "#3a3a3a"   # elevated surface (inputs, cards, tables)
